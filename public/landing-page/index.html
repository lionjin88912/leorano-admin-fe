<!DOCTYPE html>
<html>

<head>
  <title>Le Oràno Landing Pgae</title>
  <meta charset="utf-8">
  <meta name="description" content="Le Oràno Landing Pgae">
  <meta name="viewport"
    content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width, viewport-fit=cover">
  <script lang="javascript">
    function onload() {
      const locale = navigator.language.toLowerCase();
      const ua = navigator.userAgent.toLowerCase();

      if (ua.includes('iphone')) {
        goStore('ios');
      } else if (ua.includes('android')) {
        goStore('android');
      }

      if (locale.includes('tw')) {
        document.getElementById('title').innerText = '次世代生活旅遊生活旅遊俱樂部';
        document.getElementById('download-text').innerText = '立即下載';
      } else if (locale.includes('cn')) {
        document.getElementById('title').innerText = '次世代生活旅游生活旅游俱乐部';
        document.getElementById('download-text').innerText = '立即下载';
      } else {
        document.getElementById('title').innerText = 'The Next Generation of Travel Club';
        document.getElementById('download-text').innerText = 'Download Now';
      }
    }

    function goStore(system) {
      let url = null
      if (system === 'ios') {
        url = 'https://apps.apple.com/app/le-orano/id6448860394';
      } else {
        url = 'https://play.google.com/store/apps/details?id=com.leorano.android&hl=zh-TW'
      }
      window.open(url, '_self');
    }
  </script>
</head>

<body onload="onload()">
  <div class="bg">
    <div class="content">
      <img class="logo" src="/logo-white.svg">
      <div id="title" class="title">The Next Generation of Travel Club</div>
      <div id="download-text" class="download-text">Download Now</div>
      <div class="button-row">
        <img src="/ios.png" onclick="goStore('ios')">
        <img src="/android.png" onclick="goStore('android')">
      </div>
    </div>
  </div>
</body>
<style>
  @font-face {
    font-family: "Noto Serif TC";

    font-weight: 400;

  }

  @font-face {
    font-family: "Noto Serif TC";
    font-style: normal;
    font-weight: 700;
    src: url("/fonts/NotoSerifTC-Bold.otf");
  }

  @font-face {
    font-family: "Noto Serif SC";
    font-style: normal;
    font-weight: 400;
    src: url("/fonts/NotoSerifSC-Regular.otf");
  }

  @font-face {
    font-family: "Noto Serif SC";
    font-style: normal;
    font-weight: 700;
    src: url("/fonts/NotoSerifSC-Bold.otf");
  }

  @font-face {
    font-family: "Charter";

    src: url("/fonts/Charter-Regular.otf");

  body,
  html,

  }

  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
  }

  .bg {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    height: 100vh;
    background-image: url('/bg.jpg');
    background-repeat: no-repeat;
    background-position: center;
    background-size: cover;
    overflow: hidden;
    color: #FFF;
  }

  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .content .logo {
    width: 200px;
  }

  .title {
    font-weight: 400;
    font-size: 22px;
    line-height: 33px;
    padding: 16px 0px;
  }

  .download-text {
    display: flex;
    align-items: center;
    font-weight: 400;
    font-size: 16px;
    line-height: 24px;
  }

  .download-text::before {
    content: '';
    width: 80px;
    height: 1px;
    background-color: #FFF;
    margin-right: 12px;
  }

  .download-text::after {
    content: '';
    width: 80px;
    height: 1px;
    background-color: #FFF;
    margin-left: 12px;
  }

  .button-row {
    display: flex;
    column-gap: 16px;
    padding: 16px;
  }

  .button-row img {
    cursor: pointer;
    width: 135px;
  }

  @media screen and (max-width: 420px) {

    }

    .download-text {

    }
  }

  @media screen and (max-width: 375px) {

      width: 135px;

    }

    .download-text {
      font-size: 12px;
      line-height: 18px;

  }
</style>

</html>
