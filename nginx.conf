 server {
        listen 80;
        root /var/www/html;
        index index.html;
        server_name localhost;
        client_max_body_size 16m;

        location / {
            try_files $uri $uri/ /index.html;
        }

        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
        }

        location ~* \.(?:css|js)$ {
            expires 12h;
            access_log off;
        }
    }
